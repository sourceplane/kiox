version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: kiox
    main: ./cmd/kiox
    binary: kiox
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/sourceplane/kiox/pkg/version.Version={{ .Version }}

archives:
  - id: kiox-archive
    ids:
      - kiox
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: git
