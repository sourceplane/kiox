name: provider-ghcr-e2e

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  push-install-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build tinx
        run: |
          mkdir -p bin
          go build -o bin/tinx ./cmd/tinx

      - name: Compute GHCR ref
        id: vars
        run: |
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "ref=ghcr.io/${owner}/tinx-echo-provider:ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push example provider
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./bin/tinx release \
            --manifest testdata/echo-provider/tinx.yaml \
            --main ./cmd/echo-provider \
            --dist testdata/echo-provider/dist \
            --output testdata/echo-provider/oci \
            --push "${{ steps.vars.outputs.ref }}"

      - name: Create workspace and run from GHCR
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd testdata/echo-provider
          workspace_root="$RUNNER_TEMP/tinx-workspace"
          ../../bin/tinx --tinx-home "$RUNNER_TEMP/tinx-home" init "$workspace_root"
          ../../bin/tinx --tinx-home "$RUNNER_TEMP/tinx-home" --workspace "$workspace_root" add "${{ steps.vars.outputs.ref }}" as echo
          ../../bin/tinx --tinx-home "$RUNNER_TEMP/tinx-home" --workspace "$workspace_root" -- echo plan --intent "$PWD/intent.yaml" | tee "$RUNNER_TEMP/echo-run.out"
          grep -q "capability=plan" "$RUNNER_TEMP/echo-run.out"
