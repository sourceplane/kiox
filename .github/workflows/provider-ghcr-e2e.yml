name: provider-ghcr-e2e

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  push-install-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build tinx
        run: |
          mkdir -p bin
          go build -o bin/tinx ./cmd/tinx

      - name: Compute GHCR ref
        id: vars
        run: |
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "ref=ghcr.io/${owner}/tinx-echo-provider:ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push example provider
        run: |
          ./bin/tinx release \
            --manifest testdata/echo-provider/tinx.yaml \
            --main ./cmd/echo-provider \
            --dist testdata/echo-provider/dist \
            --output testdata/echo-provider/oci \
            --push-ref "${{ steps.vars.outputs.ref }}"

      - name: Install and run from GHCR
        run: |
          cd testdata/echo-provider
          ../../bin/tinx --tinx-home "$RUNNER_TEMP/tinx-home" install sourceplane/echo-provider --ref "${{ steps.vars.outputs.ref }}" --alias echo
          ../../bin/tinx --tinx-home "$RUNNER_TEMP/tinx-home" run echo plan --intent intent.yaml | tee "$RUNNER_TEMP/echo-run.out"
          grep -q "capability=plan" "$RUNNER_TEMP/echo-run.out"
